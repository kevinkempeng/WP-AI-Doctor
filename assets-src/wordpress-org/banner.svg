    <text x="0" y="102" fill="#f7f8ff" font-size="86" font-weight="700">AI Error Doctor</text>
    <text x="3" y="165" fill="#aeb5d1" font-size="30">Privacy-first WordPress diagnostics</text>
    <g transform="translate(3 218)">
