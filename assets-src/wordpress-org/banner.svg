<svg xmlns="http://www.w3.org/2000/svg" width="1544" height="500" viewBox="0 0 1544 500" role="img" aria-labelledby="title desc">
  <title id="title">PressCare AI Error Doctor</title>
  <desc id="desc">A dark PressCare banner with a shield, error pulse, and AI nodes.</desc>
  <defs>
    <linearGradient id="background" x1="74" y1="30" x2="1475" y2="492" gradientUnits="userSpaceOnUse">
      <stop stop-color="#20284f"/>
      <stop offset=".56" stop-color="#121730"/>
      <stop offset="1" stop-color="#0c1025"/>
    </linearGradient>
    <linearGradient id="shield" x1="142" y1="100" x2="385" y2="404" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00ffaa"/>
      <stop offset="1" stop-color="#4ac6ff"/>
    </linearGradient>
    <radialGradient id="orb">
      <stop stop-color="#6646e8" stop-opacity=".34"/>
      <stop offset="1" stop-color="#6646e8" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="9" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1544" height="500" fill="url(#background)"/>
  <circle cx="215" cy="250" r="316" fill="url(#orb)"/>
  <circle cx="1408" cy="60" r="210" fill="url(#orb)" opacity=".45"/>
  <g opacity=".14" fill="none" stroke="#aeb5d1" stroke-width="2">
    <path d="M0 407c197-110 335 29 528-59s374-139 604-35 311 8 412-34"/>
    <path d="M0 446c197-110 335 29 528-59s374-139 604-35 311 8 412-34"/>
  </g>
  <g transform="translate(92 54)">
