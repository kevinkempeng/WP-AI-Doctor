    <path d="M83 217h67l24-59 38 117 27-58h58" fill="none" stroke="#00ffaa" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
    <g fill="#f7f8ff" stroke="#6646e8" stroke-width="8">
      <circle cx="102" cy="116" r="13"/>
      <circle cx="277" cy="113" r="13"/>
      <circle cx="190" cy="332" r="13"/>
