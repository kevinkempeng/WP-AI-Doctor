name: Feature request
description: Suggest a focused improvement for PressCare AI Error Doctor.
title: "Feature: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: Describe the user or diagnostic problem, not only the proposed interface.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed improvement
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: principles
    attributes:
      label: Project principles
      options:
        - label: The proposal can remain read-only by default.
        - label: The proposal can avoid sending data externally without explicit administrator consent.
